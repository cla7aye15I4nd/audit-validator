# AB Core Testnet config

# AWS KMS
APISignKeyId = "alias/ABConnectSignKey"
ManagerAPISignKeyId = "alias/ABConnectSignKey"
CoreSignKeyId = "alias/ABConnectSignKey"
ToolsSignKeyId = "alias/ABConnectSignKey"

LogLevel = "debug"

EnableNotify = true
[Pushover]
    Token = "<pushover_token>"
    Key = "<pushover_key>"

[Blockchain]
    Network = "ABCoreTestnet" # blockchainId <==> network + chain
    ChainId = "26888" # ChainId or chain name, get from rpcurl
    BaseChain = "Ethereum"
    ChainAPIHost = "127.0.0.1:8601"
    RPCUrl = "https://rpc.core.testnet.ab.org"
    DelayBlockNumber = 20 # block number to confirm
    ChainKeyId = "alias/ABConnectKey"
    ChainAPISignKeyId = "alias/ABConnectSignKey"
    ChainTaskSignKeyId = "alias/ABConnectSignKey"
    ChainManagerSignKeyId = "alias/ABConnectSignKey"
    MonitorSignKeyId = "alias/ABConnectSignKey"

[Blockchain.DB]
    adapter = "mysql"
    database = "abconnect_abcore_testnet_accounts"
    host = "127.0.0.1"
    password = "password"
    user = "abconnect_accounts"

[DB]
    adapter = "mysql"
    database = "abconnect"
    host = "127.0.0.1"
    password = "password"
    user = "abconnect"

